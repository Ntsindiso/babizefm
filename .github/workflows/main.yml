name: 24/7 Babize FM - Smart Vibe Switcher

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Start Smart-Switching Stream
        run: |
          while true; do
            # 1. Get current SA Hour (UTC+2)
            HOUR=$(date -u -d "+2 hours" +%H)
            echo "Time Check: $HOUR:00 - Deciding vibe..."

            # 2. Assign folder based on time
            if [ "$HOUR" -ge 05 ] && [ "$HOUR" -lt 12 ]; then
              FOLDER="./Music/Morning"
              VIBE="Morning Energy"
            elif [ "$HOUR" -ge 12 ] && [ "$HOUR" -lt 18 ]; then
              FOLDER="./Music/Midday"
              VIBE="Midday Focus"
            else
              FOLDER="./Music/Night"
              VIBE="Night Chill"
            fi

            echo "Current Vibe: $VIBE"

            # 3. Pick 3 random songs from that folder
            files=$(find "$FOLDER" -iname "*.mp3" | shuf -n 3)
            
            # Check if files exist, otherwise fallback to main Music
            if [ -z "$files" ]; then
              files=$(find "./Music" -iname "*.mp3" | shuf -n 3)
            fi

            # 4. Build the Crossfade filter for these 3 tracks
            filter=""
            inputs=""
            count=0
            # Use a while loop to handle filenames with spaces safely
            while read -r f; do
              inputs="$inputs -i \"$f\""
              if [ $count -eq 0 ]; then
                filter="[0:a]"
              else
                filter="${filter}[$count:a]acrossfade=d=5:c1=tri:c2=tri[a${count}];[a${count}]"
              fi
              count=$((count+1))
            done <<< "$files"
            
            filter=$(echo $filter | sed 's/;\[a[0-9]*\]$//')

            # 5. Stream the 3-song set to Zeno.fm
            echo "Starting 3-song set..."
            eval "ffmpeg -re $inputs -filter_complex \"$filter\" -c:a libmp3lame -b:a 128k -f mp3 icecast://source:${{ secrets.ZENO_KEY }}@${{ secrets.ZENO_URL }}"
            
            echo "Set finished. Re-checking clock for next vibe..."
          done
