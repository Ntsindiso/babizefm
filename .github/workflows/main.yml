name: 24/7 Babize FM - Smart Vibe Switcher

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install FFmpeg (Quick)
        # We remove 'sudo apt-get update' to save 5+ minutes of waiting
        run: sudo apt install -y ffmpeg

      - name: Start Smart-Switching Stream
        run: |
          while true; do
            HOUR=$(date -u -d "+2 hours" +%H)
            
            if [ "$HOUR" -ge 05 ] && [ "$HOUR" -lt 12 ]; then
              FOLDER="./Music/Morning"
            elif [ "$HOUR" -ge 12 ] && [ "$HOUR" -lt 18 ]; then
              FOLDER="./Music/Midday"
            else
              FOLDER="./Music/Night"
            fi

            echo "Current Vibe: $FOLDER"

            # Pick 3 random songs
            files=$(find "$FOLDER" -iname "*.mp3" | shuf -n 3)
            
            if [ -z "$files" ]; then
              echo "Checking root Music folder as fallback..."
              files=$(find "./Music" -iname "*.mp3" | shuf -n 3)
            fi

            # Build the Crossfade filter
            filter=""
            inputs=""
            count=0
            while read -r f; do
              [ -z "$f" ] && continue
              inputs="$inputs -i \"$f\""
              if [ $count -eq 0 ]; then
                filter="[0:a]"
              else
                filter="${filter}[$count:a]acrossfade=d=5:c1=tri:c2=tri[a${count}];[a${count}]"
              fi
              count=$((count+1))
            done <<< "$files"
            
            filter=$(echo $filter | sed 's/;\[a[0-9]*\]$//')

            # Stream to Zeno.fm
            eval "ffmpeg -re $inputs -filter_complex \"$filter\" -c:a libmp3lame -b:a 128k -f mp3 icecast://source:${{ secrets.ZENO_KEY }}@${{ secrets.ZENO_URL }}"
          done
