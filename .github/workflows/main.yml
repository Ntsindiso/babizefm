name: 24/7 Babize FM - Pro DJ Crossfade

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Start Crossfade Stream
        run: |
          # 1. Get SA Time
          HOUR=$(date -u -d "+2 hours" +%H)
          echo "Current SA Hour: $HOUR"

          # 2. Pick Folder
          if [ "$HOUR" -ge 05 ] && [ "$HOUR" -lt 12 ]; then
            FOLDER="./Music/Morning"
          elif [ "$HOUR" -ge 12 ] && [ "$HOUR" -lt 18 ]; then
            FOLDER="./Music/Midday"
          else
            FOLDER="./Music/Night"
          fi

          # 3. Create a list of files for the DJ filter
          # This handles spaces in names perfectly
          files=$(find "$FOLDER" -iname "*.mp3" | shuf)
          
          # 4. Build the Crossfade Command
          # This filter overlaps songs by 5000ms (5 seconds)
          filter=""
          inputs=""
          count=0
          for f in $files; do
            inputs="$inputs -i \"$f\""
            if [ $count -eq 0 ]; then
              filter="[0:a]"
            else
              filter="${filter}[$count:a]acrossfade=d=5:c1=tri:c2=tri[a${count}];[a${count}]"
            fi
            count=$((count+1))
          done
          
          # Remove the last semicolon and map the final output
          filter=$(echo $filter | sed 's/;\[a[0-9]*\]$//')

          # 5. Push the stream to Zeno.fm
          eval "ffmpeg -re $inputs -filter_complex \"$filter\" -c:a libmp3lame -b:a 128k -f mp3 icecast://source:${{ secrets.ZENO_KEY }}@${{ secrets.ZENO_URL }}"
