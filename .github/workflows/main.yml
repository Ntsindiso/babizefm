name: 24/7 Babize FM - Simple Vibe Switcher

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install FFmpeg
        # This is the simplest, fastest way to install it
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Start Scheduled Streaming
        run: |
          while true; do
            # 1. Check South African Time
            HOUR=$(date -u -d "+2 hours" +%H)
            echo "Current Hour: $HOUR"

            # 2. Pick the folder (Capitalized to match your repo)
            if [ "$HOUR" -ge 05 ] && [ "$HOUR" -lt 12 ]; then
              FOLDER="./Music/Morning"
            elif [ "$HOUR" -ge 12 ] && [ "$HOUR" -lt 18 ]; then
              FOLDER="./Music/Midday"
            else
              FOLDER="./Music/Night"
            fi

            echo "Targeting Folder: $FOLDER"

            # 3. Find 3 random songs from that specific folder
            # If the folder is empty, it will check the main Music folder
            files=$(find "$FOLDER" -iname "*.mp3" | shuf -n 3)
            
            if [ -z "$files" ]; then
              files=$(find "./Music" -iname "*.mp3" | shuf -n 3)
            fi

            # 4. Play those 3 songs one-by-one (Simple & Reliable)
            while read -r line; do
              [ -z "$line" ] && continue
              echo "Now Airing: $line"
              ffmpeg -re -i "$line" -c:a libmp3lame -b:a 128k -f mp3 icecast://source:${{ secrets.ZENO_KEY }}@${{ secrets.ZENO_URL }}
            done <<< "$files"
            
            echo "Set finished. Checking clock again..."
          done
