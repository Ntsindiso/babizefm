name: 24/7 Babize FM Stream

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' # Restarts every 6 hours to stay live

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Start Streaming
        run: |
          # This command finds all mp3s in your Music folder, 
          # shuffles them, and streams them while ignoring spaces in names.
          find ./Music -name "*.mp3" | shuf > playlist.txt
          
          while read -r line; do
            ffmpeg -re -i "$line" -c:a libmp3lame -b:a 128k -f mp3 icecast://source:${{ secrets.ZENO_KEY }}@${{ secrets.ZENO_URL }}
          done < playlist.txt
