name: 24/7 Babize FM Scheduled Stream

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */1 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Start Scheduled Streaming
        run: |
          # 1. Get South African Time (UTC+2)
          HOUR=$(date -u -d "+2 hours" +%H)
          echo "Current SA Hour: $HOUR"

          # 2. Match your Capitalized Folders
          if [ "$HOUR" -ge 05 ] && [ "$HOUR" -lt 12 ]; then
            FOLDER="./Music/Morning"
          elif [ "$HOUR" -ge 12 ] && [ "$HOUR" -lt 18 ]; then
            FOLDER="./Music/Midday"
          else
            FOLDER="./Music/Night"
          fi

          echo "Target Folder: $FOLDER"

          # 3. Validation Check
          if [ ! -d "$FOLDER" ]; then
            echo "ERROR: Folder $FOLDER not found! Checking alternative..."
            # Fallback to main Music folder if subfolder is missing
            FOLDER="./Music"
          fi

          # 4. Infinite Loop to prevent "Success" shutdowns
          while true; do
            # find all .mp3 or .MP3 files
            find "$FOLDER" -iname "*.mp3" > playlist.txt
            
            if [ ! -s playlist.txt ]; then
              echo "ERROR: No music found in $FOLDER. Stopping."
              exit 1
            fi

            shuf playlist.txt -o playlist.txt

            while IFS= read -r line; do
              echo "Now Airing: $line"
              # The streaming command
              ffmpeg -re -i "$line" -c:a libmp3lame -b:a 128k -f mp3 icecast://source:${{ secrets.ZENO_KEY }}@${{ secrets.ZENO_URL }}
            done < playlist.txt
            
            echo "Restarting playlist for $FOLDER..."
          done
