name: 24/7 Babize FM - Self-Healing Stream

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Start Scheduled Streaming
        run: |
          while true; do
            # 1. Update the folder list to see NEW songs you just uploaded
            git pull origin main || echo "No new updates found"

            # 2. Check SA Time
            HOUR=$(date -u -d "+2 hours" +%H)
            
            if [ "$HOUR" -ge 05 ] && [ "$HOUR" -lt 12 ]; then
              FOLDER="./Music/Morning"
            elif [ "$HOUR" -ge 12 ] && [ "$HOUR" -lt 18 ]; then
              FOLDER="./Music/Midday"
            else
              FOLDER="./Music/Night"
            fi

            # 3. Pick 3 random songs
            files=$(find "$FOLDER" -iname "*.mp3" | shuf -n 3)
            
            if [ -z "$files" ]; then
              files=$(find "./Music" -iname "*.mp3" | shuf -n 3)
            fi

            # 4. Play songs (with error handling)
            while read -r line; do
              [ -z "$line" ] && continue
              echo "Now Airing: $line"
              # We added '|| true' so if one song crashes, the radio stays ALIVE
              ffmpeg -re -i "$line" -c:a libmp3lame -b:a 128k -f mp3 icecast://source:${{ secrets.ZENO_KEY }}@${{ secrets.ZENO_URL }} || echo "Song failed, skipping..."
            done <<< "$files"
          done
