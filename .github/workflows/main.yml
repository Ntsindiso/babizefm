name: 24/7 Babize FM Stream

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Start Streaming
        run: |
          # This finds all MP3s and handles spaces perfectly
          find ./Music -name "*.mp3" > playlist.txt
          
          # Shuffle the list so it's not the same every time
          shuf playlist.txt -o playlist.txt

          while IFS= read -r line; do
            echo "Now playing: $line"
            ffmpeg -re -i "$line" -c:a libmp3lame -b:a 128k -f mp3 icecast://source:${{ secrets.ZENO_KEY }}@${{ secrets.ZENO_URL }}
          done < playlist.txt
